site_name: AymaraLang
site_description: Documentación oficial de AymaraLang
site_author: Comunidad AymaraLang
repo_url: https://github.com/jhulio435m/aymaraLang
edit_uri: edit/main/docs/
theme:
  name: readthedocs
  language: es
  logo: img/logo_aymaralang.png
  navigation_depth: 1
  collapse_navigation: true
  sticky_navigation: true
exclude_docs: |
  installer_improvement_plan.md
  manual_pdf.md
  arquitectura.md
  exceptions.md
  modernizacion.md
  overview.md
  project.md
  benchmarks/*
  research/*
  systems_engineering/*
nav:
  - Inicio: index.md
  - Instalación: install.md
  - Tutorial rápido: language.md
  - Manual de usuario: manual_usuario.md
  - CLI de `aymc`: compiler.md
  - Referencia rápida: aymaraLang.md
  - Gramática formal: grammar.md
  - Compilación desde fuente: build.md
markdown_extensions:
  - attr_list
  - toc:
      permalink: true
  - tables
extra_css:
  - stylesheets/extra.css
extra_javascript:
  - javascripts/scroll-top.js
